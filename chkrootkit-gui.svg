<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1622"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- shield -->
  <path d="M128 16 L222 52 V128 C222 188 182 226 128 244
           C74 226 34 188 34 128 V52 Z"
        fill="url(#shield)" stroke="url(#edge)" stroke-width="6"/>
  <!-- circuit traces -->
  <g stroke="#13324a" stroke-width="3" fill="none" opacity="0.9">
    <path d="M60 96 H92 V120"/>
    <path d="M196 96 H164 V120"/>
    <path d="M70 168 H100"/>
    <path d="M186 168 H156"/>
  </g>
  <g fill="#00e5ff" opacity="0.8">
    <circle cx="60" cy="96" r="4"/><circle cx="196" cy="96" r="4"/>
    <circle cx="70" cy="168" r="4"/><circle cx="186" cy="168" r="4"/>
  </g>
  <!-- magnifying glass -->
  <g filter="url(#glow)">
    <circle cx="116" cy="116" r="40" fill="none" stroke="#00e5ff" stroke-width="12"/>
    <line x1="146" y1="146" x2="186" y2="186" stroke="#00e5ff"
          stroke-width="16" stroke-linecap="round"/>
    <!-- neon check inside the lens -->
    <path d="M98 116 l12 14 l24 -28" fill="none" stroke="#39ff14"
          stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
